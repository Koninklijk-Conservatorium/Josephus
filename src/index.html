<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Stencil Component Starter</title>

    <script type="module" src="/build/josephus.esm.js"></script>
    <script nomodule src="/build/josephus.js"></script>
  </head>
  <body>
    <my-component first="Stencil" middle="'Don't call me a framework'" last="JS"></my-component>
    <josephus-timer id="test" debug="true"></josephus-timer>
    <script>
      const el = document.querySelector('#test');
      el.addEventListener('josephus-timer-state-changed', event => {
        console.log(event);
      });
      el.addEventListener('josephus-timer-progress', event => {
        console.log(event);
      });
    </script>
  </body>
</html>
