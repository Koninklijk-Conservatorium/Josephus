<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Stencil Component Starter</title>

    <script type="module" src="/build/josephus.esm.js"></script>
    <script nomodule src="/build/josephus.js"></script>
    <!--Load verovio-->
    <script src="https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js" defer></script>
    <script>
      document.addEventListener('DOMContentLoaded', event => {
        verovio.module.onRuntimeInitialized = async () => {
          window.josephus ??= {};
          window.josephus.verovio = new verovio.toolkit();
          const event = new CustomEvent('josephus-verovio-initialized', { detail: 'dupa!' });
          document.dispatchEvent(event);
        };
      });
    </script>
  </head>
  <body>
    <my-component first="Stencil" middle="'Don't call me a framework'" last="JS"></my-component>
    <josephus-task></josephus-task>
