<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Stencil Component Starter</title>
    <script type="module" src="/build/josephus.esm.js"></script>
    <script nomodule src="/build/josephus.js"></script>
    <!--Load verovio-->
    <script src="https://www.verovio.org/javascript/latest/verovio-toolkit-hum.js" defer></script>
    <!--Load Tone.js-->
    <script src="http://unpkg.com/tone"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <!--<josephus-library></josephus-library>-->
    <script>
      document.addEventListener('DOMContentLoaded', event => {
        // Initialize Josephus itself.
        window.josephus ??= {};

        window.josephus.tone = Tone;
        document.dispatchEvent(new CustomEvent('josephus-tonejs-initialized'));

        window.josephus.midi = Midi;
        document.dispatchEvent(new CustomEvent('josephus-tonemidi-initialized'));

        fetch('stubs/library.json')
          // fetch('https://cappellaboanerges.nl/josephus-library/library.json')
          .then(r => r.json())
          .then(lib => {
            window.josephus.library = lib.library;
            document.dispatchEvent(new CustomEvent('josephus-library-initialized'));
          });

        verovio.module.onRuntimeInitialized = async () => {
          window.josephus.verovio = verovio //new verovio.toolkit();
          document.dispatchEvent(new CustomEvent('josephus-verovio-initialized'));
        };
      });
    </script>
  </head>
  <body>
    <josephus-exam href="stubs/exam.json"></josephus-exam>
    <!--<josephus-snippet href="https://www.verovio.org/examples/downloads/Schubert_Lindenbaum.mei"></josephus-snippet>-->

      el.addEventListener('josephus-timer-progress', event => {

    </script>-->

</html>
